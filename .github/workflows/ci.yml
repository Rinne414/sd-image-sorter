name: CI

on:
  push:
  pull_request:

env:
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

jobs:
  linux-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Install Playwright dependencies
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run full CI script
        run: python scripts/run_ci.py

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml

  windows-risk-areas:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Path identity and migration tests
        working-directory: backend
        run: |
          python -m pytest tests/test_source_paths.py tests/test_database.py -k "schema_version or legacy_database_without_schema_version or windows or drive or wsl" -q

      - name: Indexed overwrite reconciliation tests
        working-directory: backend
        run: |
          python -m pytest tests/test_routers/test_images.py tests/test_routers/test_prompts_censor_similarity_artists.py tests/test_routers/test_obfuscation.py -k "overwrite_refreshes_indexed_state or same_path_overwrite" -q

      - name: Release and updater tests
        working-directory: backend
        run: |
          python -m pytest tests/test_release_build.py tests/test_update_service.py tests/test_update_worker.py -q

  macos-compat:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Backend full test suite (macOS)
        working-directory: backend
        run: |
          python -m pytest tests/ -q --ignore=tests/test_update_worker.py

      - name: Verify server boots on macOS
        run: |
          chmod +x run.sh
          python backend/main.py --port 18999 &
          PID=$!
          for i in $(seq 1 20); do
            if curl -s http://127.0.0.1:18999/ > /dev/null 2>&1; then
              echo "Server booted successfully on macOS"
              kill $PID
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to boot within 20s"
          kill $PID 2>/dev/null
          exit 1

  linux-portable-smoke:
    # Builds the linux-portable-{x86_64,aarch64}.tar.gz on a clean
    # GitHub-runner Ubuntu, then extracts it into a fresh directory and
    # runs ./run-portable.sh end-to-end. This catches regressions where:
    #   - python-build-standalone URL/SHA256 drifts on either arch
    #   - run-portable.sh contains shell syntax that fails on /bin/sh
    #   - the bundled cpython-3.13 cannot import core lockfile deps on
    #     the baseline GitHub runner glibc (currently 2.35 on
    #     ubuntu-22.04 x86_64 / ubuntu-24.04-arm aarch64)
    #   - the in-app updater asset name diverges from app_info.py
    # The bundled launcher must come up on http://127.0.0.1:8499/ and
    # serve the index page within ~120 s (cold install of
    # requirements-core.txt).
    #
    # We run BOTH arches in CI so a regression that only affects one
    # CPU family (e.g., a numpy wheel that is missing on aarch64 only)
    # cannot ship silently.
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build linux-portable archive (both arches)
        env:
          # Use the runner's pip cache so repeat runs don't re-download
          # python-build-standalone every time.
          PIP_CACHE_DIR: ${{ runner.temp }}/pip-cache
        run: |
          python scripts/build_release_packages.py

      - name: Verify both arch assets landed in artifacts/release/
        run: |
          ls -lh artifacts/release/
          test -f artifacts/release/sd-image-sorter-v*-linux-portable-x86_64.tar.gz
          test -f artifacts/release/sd-image-sorter-v*-linux-portable-aarch64.tar.gz

      - name: Extract the matching arch into a fresh directory
        run: |
          mkdir -p ${{ runner.temp }}/portable-extract
          tar -xzf artifacts/release/sd-image-sorter-v*-linux-portable-${{ matrix.arch }}.tar.gz \
            -C ${{ runner.temp }}/portable-extract
          ls -la ${{ runner.temp }}/portable-extract/sd-image-sorter/
          # Sanity-check the executables came through the tar with their
          # exec bits intact.
          test -x ${{ runner.temp }}/portable-extract/sd-image-sorter/run-portable.sh
          test -x ${{ runner.temp }}/portable-extract/sd-image-sorter/python/bin/python3
          # Confirm the bundled interpreter actually matches the running
          # CPU arch (catch a swap that would only fail at runtime).
          file ${{ runner.temp }}/portable-extract/sd-image-sorter/python/bin/python3 \
            | tee ${{ runner.temp }}/python-arch.txt
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            grep -q "x86-64" ${{ runner.temp }}/python-arch.txt
          else
            grep -q -E "ARM aarch64|aarch64" ${{ runner.temp }}/python-arch.txt
          fi

      - name: Boot via run-portable.sh and probe the API
        env:
          SD_IMAGE_SORTER_PORT: "8499"
        run: |
          cd ${{ runner.temp }}/portable-extract/sd-image-sorter
          # Run the launcher in the background so we can probe it. The
          # launcher itself execs the Python server at the end, so killing
          # this PID kills the server too.
          ./run-portable.sh > ${{ runner.temp }}/portable-launcher.log 2>&1 &
          LAUNCHER_PID=$!
          echo "Launcher PID: $LAUNCHER_PID"

          # Wait up to 240 s for the server (first run installs core deps;
          # the aarch64 runner is a bit slower than x86_64 so we give a
          # wider budget).
          for i in $(seq 1 240); do
            if curl -fsS --max-time 3 http://127.0.0.1:8499/ > /dev/null; then
              echo "[smoke] Server responded after ${i}s"
              # Also probe the API health to ensure routes are live, not
              # just the static frontend.
              curl -fsS --max-time 5 http://127.0.0.1:8499/api/aesthetic/status \
                | head -c 200
              echo
              kill $LAUNCHER_PID 2>/dev/null || true
              # Give the launcher a moment to clean up, then fall through to success.
              sleep 2
              exit 0
            fi
            sleep 1
          done

          echo "[smoke] Server did not come up within 240s"
          echo "[smoke] --- launcher log ---"
          cat ${{ runner.temp }}/portable-launcher.log || true
          kill $LAUNCHER_PID 2>/dev/null || true
          exit 1

      - name: Upload launcher log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-portable-smoke-log-${{ matrix.arch }}
          path: ${{ runner.temp }}/portable-launcher.log
