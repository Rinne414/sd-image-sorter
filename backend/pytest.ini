[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Verbose output
addopts = -v --tb=short

# Coverage settings (when using pytest-cov)
# Run with: pytest --cov=. --cov-report=html
[pytest-cov]
source = .
omit =
    tests/*
    */venv/*
    */__pycache__/*
    */site-packages/*
